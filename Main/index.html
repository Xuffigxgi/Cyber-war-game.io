<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_WAR_V14_ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --g: #00ff41; --b: #00d2ff; --r: #ff0055; --y: #ffff00; --p: #bc00ff; --w: #ffffff; }
        body { background: #000; color: var(--g); font-family: 'Consolas', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* UI Elements */
        .header { display: flex; flex-wrap: wrap; background: #111; padding: 10px; border-bottom: 2px solid #333; font-size: 12px; justify-content: space-around; gap: 10px; }
        #terminal { flex: 1; padding: 15px; overflow-y: auto; background: black; line-height: 1.5; }
        .input-line { display: flex; background: #0a0a0a; padding: 15px; border-top: 1px solid #333; align-items: center; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; font-family: inherit; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        .auth-box { border: 1px solid var(--g); padding: 30px; width: 320px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .btn { padding: 10px 20px; margin: 10px; cursor: pointer; border: 1px solid var(--g); background: transparent; color: var(--g); font-family: inherit; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--g); color: #000; }

        /* Effects */
        .c-h { color: var(--r); } .c-p { color: var(--b); } .c-y { color: var(--y); } .c-sys { color: #555; }
        .alert-box { background: var(--r); color: #fff; padding: 5px; text-align: center; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="scr-auth" class="overlay">
    <div class="auth-box">
        <h2 style="letter-spacing: 3px;">CYBER_WAR LOGIN</h2>
        <input type="text" id="auth-user" placeholder="USERNAME" style="width:90%; padding:10px; margin:5px; background:#111; border:1px solid #333; color:white;"><br>
        <input type="password" id="auth-pass" placeholder="PASSWORD (5-20)" style="width:90%; padding:10px; margin:5px; background:#111; border:1px solid #333; color:white;"><br>
        <button class="btn" onclick="handleAuth('register')">REGISTER</button>
        <button class="btn" style="border-color:var(--b); color:var(--b);" onclick="handleAuth('login')">LOGIN</button>
        <p id="auth-msg" style="font-size: 11px; margin-top:10px;"></p>
    </div>
</div>

<div id="scr-role" class="overlay hidden">
    <h2>IDENTIFY YOUR FACTION</h2>
    <button class="btn" style="border-color:var(--r); color:var(--r);" onclick="chooseRole('Hacker')">HACKER (SYNDICATE)</button>
    <button class="btn" style="border-color:var(--b); color:var(--b);" onclick="chooseRole('Police')">POLICE (ENFORCER)</button>
</div>

<div id="game-ui" class="hidden" style="display:contents;">
    <div class="header">
        <span>USER: <b id="u-name">-</b></span>
        <span>CASH: <b class="c-y">$<span id="u-cash">0</span></b></span>
        <span>IP: <b id="u-ip">-</b></span>
        <span>TEAM: <b id="u-team">NONE</b></span>
        <span>BANK SEC: <b id="u-sec" class="c-p">0%</b></span>
    </div>
    <div id="terminal">
        <div id="alert-zone"></div>
        <div id="t-log"></div>
    </div>
    <div class="input-line">
        <span id="pfx">></span>
        <input type="text" id="main-in" autocomplete="off" placeholder="type 'help'...">
    </div>
</div>

<script>
    // --- Firebase Setup ---
    const firebaseConfig = { databaseURL: "https://discbbrord-b9757-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Game State ---
    let user = { 
        name: '', role: '', cash: 0, ip: '', team: null, 
        items: [], exploitRate: 15, stealth: false, virusLevel: 0 
    };
    let globalBankSec = 0;

    // --- Auth Logic ---
    async function handleAuth(type) {
        const uName = document.getElementById('auth-user').value.trim();
        const uPass = document.getElementById('auth-pass').value.trim();
        const msg = document.getElementById('auth-msg');

        if (!uName || uPass.length < 5 || uPass.length > 20) {
            return msg.innerText = "Error: รหัสต้อง 5-20 ตัวอักษร";
        }

        const userRef = db.ref('players/' + uName);
        const snapshot = await userRef.once('value');

        if (type === 'register') {
            if (snapshot.exists()) return msg.innerText = "Error: ชื่อนี้ถูกใช้งานแล้ว";
            await userRef.set({ password: uPass, cash: 5000, items: [], role: 'new', exploit: 15 });
            msg.innerText = "สมัครสำเร็จ! กรุณากด Login";
        } else {
            if (!snapshot.exists() || snapshot.val().password !== uPass) return msg.innerText = "Error: ข้อมูลไม่ถูกต้อง";
            user.name = uName;
            const data = snapshot.val();
            user.cash = data.cash || 5000;
            user.exploitRate = data.exploit || 15;
            if (data.role === 'new') {
                document.getElementById('scr-auth').classList.add('hidden');
                document.getElementById('scr-role').classList.remove('hidden');
            } else {
                user.role = data.role;
                startGame();
            }
        }
    }

    function chooseRole(r) {
        user.role = r;
        db.ref('players/' + user.name).update({ role: r });
        document.getElementById('scr-role').classList.add('hidden');
        startGame();
    }

    function startGame() {
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('scr-auth').classList.add('hidden');
        user.ip = `${Math.floor(Math.random()*254)+1}.${Math.floor(Math.random()*254)+1}.1.1`;
        updateUI();
        log(`[CONNECTED] ยินดีต้อนรับ ${user.name} เข้าสู่ระบบเครือข่าย...`, 'c-y');
        
        // Listen to Bank Security
        db.ref('global/bankSec').on('value', snap => {
            globalBankSec = snap.val() || 0;
            document.getElementById('u-sec').innerText = globalBankSec + "%";
        });

        // Listen to Hacker Alerts (For Police)
        if(user.role === 'Police') {
            db.ref('global/alerts').on('value', snap => {
                const data = snap.val();
                if(data && data.ip !== user.ip) {
                    log(`🚨 [INTRUSION] ตรวจพบการแฮกจาก IP: ${data.ip}`, 'c-h');
                }
            });
        }
    }

    function updateUI() {
        document.getElementById('u-name').innerText = user.name;
        document.getElementById('u-cash').innerText = user.cash;
        document.getElementById('u-ip').innerText = user.ip;
        document.getElementById('u-team').innerText = user.team || 'NONE';
        document.getElementById('pfx').innerText = `${user.name}@${user.role.toLowerCase()}:~$ `;
        db.ref('players/' + user.name).update({ cash: user.cash, exploit: user.exploitRate });
    }

    function log(m, c='') {
        const out = document.getElementById('t-log');
        const div = document.createElement('div');
        div.className = c;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}`;
        out.appendChild(div);
        document.getElementById('terminal').scrollTop = 99999;
    }

    // --- Commands Logic ---
    const COMMANDS = {
        'help': () => {
            log("--- ระบบคำสั่ง ---");
            log("shop - เปิดร้านค้าอุปกรณ์");
            log("transfer [IP] [AMT] - โอนเงินให้เพื่อน");
            log("team-join [NAME] - เข้าร่วมทีม");
            if(user.role === 'Hacker') {
                log("hack-bank - เจาะธนาคารปกติ");
                log("hack-central - เจาะธนาคารใหญ่ (ต้องใช้ทีม)");
                log("upgrade-exploit - เพิ่มโอกาสแฮกสำเร็จ ($5000)");
            } else {
                log("bank-fortify - เพิ่มความปลอดภัยธนาคาร ($5000)");
                log("trace - ค้นหา IP ผู้แฮกล่าสุด");
            }
        },
        'shop': () => {
            log("--- MARKET ---");
            if(user.role === 'Hacker') {
                log("[v1] Virus Lv1 ($3000) - ดักเงินทีละ $1", 'c-y');
                log("[v2] Virus Lv2 ($10000) - ดักเงินธนาคารโบนัส x100", 'c-y');
                log("[v3] OMEGA ($9B) - ดักเงินทุกคน 10% (คูลดาวน์ 2 เดือน)", 'c-y');
                log("[stealth] Stealth Virus ($15000) - แฮกไม่ติด Alert", 'c-y');
                log("[wipe] Data Wipe ($10000) - ล้างค่าหัวและประวัติ", 'c-y');
            } else {
                log("[monitor] IP Monitor ($7000) - ดัก IP โจรที่แฮกธนาคารอัตโนมัติ", 'c-p');
                log("[firewall] Global Firewall ($20000) - ลดโอกาสโจรแฮกสำเร็จ 10%", 'c-p');
            }
        },
        'buy': (id) => {
            if(id === 'v1' && user.cash >= 3000) { user.cash -= 3000; user.virusLevel = 1; log("ติดตั้ง Virus Lv1"); }
            else if(id === 'v2' && user.cash >= 10000) { user.cash -= 10000; user.virusLevel = 2; log("ติดตั้ง Virus Lv2"); }
            else if(id === 'stealth' && user.cash >= 15000) { user.cash -= 15000; user.stealth = true; log("เปิดระบบ Stealth Mode"); }
            else if(id === 'monitor' && user.role === 'Police' && user.cash >= 7000) { user.cash -= 7000; user.items.push('monitor'); log("ติดตั้ง IP Monitor"); }
            else { log("เงินไม่พอหรือรหัสสินค้าผิด!"); }
            updateUI();
        },
        'transfer': (targetIp, amount) => {
            let amt = parseInt(amount);
            if(!targetIp || isNaN(amt) || amt > user.cash) return log("การโอนล้มเหลว: ข้อมูลไม่ถูกต้อง");
            user.cash -= amt;
            log(`โอนเงิน $${amt} ไปยัง ${targetIp} เรียบร้อย (บันทึก Log กันโกง)`, 'c-p');
            updateUI();
        },
        'team-join': (name) => {
            if(!name) return log("กรุณาระบุชื่อทีม");
            user.team = name;
            log(`เข้าร่วมทีม [${name}] สำเร็จ!`, 'c-g');
            updateUI();
        },
        'hack-bank': () => {
            if(user.role !== 'Hacker') return log("สิทธิ์ไม่เพียงพอ");
            log("กำลัง Bypass Firewall...");
            setTimeout(() => {
                let chance = user.exploitRate - (globalBankSec / 5);
                if(Math.random() * 100 < chance) {
                    let win = 2000 + Math.floor(Math.random()*3000);
                    user.cash += win;
                    log(`💰 SUCCESS: แฮกสำเร็จได้รับ $${win}`, 'c-g');
                    if(!user.stealth) db.ref('global/alerts').set({ ip: user.ip, time: Date.now() });
                } else {
                    log("❌ FAILED: ระบบธนาคารป้องกันไว้ได้", 'c-h');
                }
                updateUI();
            }, 3000);
        },
        'bank-fortify': () => {
            if(user.role !== 'Police' || user.cash < 5000) return log("เงินไม่พอหรือสิทธิ์ไม่เพียงพอ");
            user.cash -= 5000;
            db.ref('global/bankSec').transaction(val => (val || 0) + 5);
            log("เพิ่มความปลอดภัยธนาคารกลาง +5%", 'c-p');
            updateUI();
        },
        'upgrade-exploit': () => {
            if(user.cash < 5000) return log("เงินไม่พอ ($5000)");
            user.cash -= 5000;
            user.exploitRate += 3;
            log(`อัปเกรดเครื่องมือเจาะระบบสำเร็จ! (Exploit: ${user.exploitRate}%)`, 'c-y');
            updateUI();
        }
    };

    // --- Event Listeners ---
    document.getElementById('main-in').addEventListener('keydown', e => {
        if(e.key === 'Enter') {
            const val = e.target.value.trim();
            const args = val.split(' ');
            const cmd = args[0].toLowerCase();
            if(COMMANDS[cmd]) COMMANDS[cmd](args[1], args[2]);
            else if(cmd === 'clear') document.getElementById('t-log').innerHTML = '';
            else log("ไม่พบคำสั่งนี้ พิมพ์ 'help'");
            e.target.value = '';
        }
    });

    // --- Passive Virus Loop ---
    setInterval(() => {
        if(user.virusLevel === 1) { user.cash += 1; updateUI(); }
        if(user.virusLevel === 2) { user.cash += 100; log("Virus v2 Passive: +$100", 'c-sys'); updateUI(); }
    }, 5000);
</script>
</body>
</html>
