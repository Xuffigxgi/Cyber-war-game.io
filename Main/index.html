<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER_WAR_V12_THE_SYNDICATE</title>
    <style>
        :root { --g: #00ff41; --b: #00d2ff; --r: #ff0055; --y: #ffff00; --p: #bc00ff; --w: #ffffff; --dark: #0a0a0a; }
        body { background: #000; color: var(--g); font-family: 'Consolas', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { display: flex; flex-wrap: wrap; background: #111; padding: 8px; border-bottom: 2px solid #333; font-size: 11px; justify-content: space-around; }
        #terminal { flex: 1; padding: 15px; overflow-y: auto; background: black; border: 1px solid #222; }
        .input-line { display: flex; background: #050505; padding: 15px; border-top: 1px solid #333; }
        input { background: transparent; border: none; color: var(--w); flex: 1; outline: none; font-size: 16px; }

        .overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        .btn { padding: 12px 24px; margin: 8px; cursor: pointer; border: 1px solid; background: transparent; color: inherit; font-family: inherit; }
        
        .m-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 8px; background: var(--dark); border-top: 1px solid #333; }
        .m-btn { background: #1a1a1a; color: #888; border: 1px solid #444; padding: 10px 2px; font-size: 9px; text-align: center; cursor: pointer; border-radius: 4px; }
        
        .c-h { color: var(--r); } .c-p { color: var(--b); } .c-y { color: var(--y); } .c-sys { color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #333; padding: 5px; text-align: left; }
    </style>
</head>
<body>

<div id="scr-auth" class="overlay">
    <div style="border: 1px solid var(--g); padding: 30px; box-shadow: 0 0 15px var(--g);">
        <h2>CORE AUTHENTICATION</h2>
        <input type="text" id="auth-user" placeholder="USERNAME" style="border: 1px solid #333; margin: 5px; padding: 10px;"><br>
        <input type="password" id="auth-pass" placeholder="PASSWORD" style="border: 1px solid #333; margin: 5px; padding: 10px;"><br>
        <button class="btn" style="border-color:var(--g)" onclick="authAction('reg')">REGISTER</button>
        <button class="btn" style="border-color:var(--b)" onclick="authAction('login')">LOGIN</button>
        <p id="auth-msg" style="font-size: 12px;"></p>
    </div>
</div>

<div id="scr-role" class="overlay hidden">
    <h2>CHOOSE SIDE</h2>
    <button class="btn" style="border-color:var(--r); color:var(--r);" onclick="initRole('Hacker')">SYNDICATE (Hacker)</button>
    <button class="btn" style="border-color:var(--b); color:var(--b);" onclick="initRole('Police')">ENFORCER (Police)</button>
</div>

<div id="game-ui" class="hidden" style="display:contents;">
    <div class="header">
        <span>LV:<b id="u-lvl">1</b></span>
        <span>CASH:<b class="c-y">$<span id="u-cash">0</span></b></span>
        <span>TEAM:<b id="u-team">None</b></span>
        <span>IP:<b id="u-ip">-</b></span>
        <span>EXPLOIT:<b class="c-p"><span id="u-exp-rate">10</span>%</b></span>
    </div>

    <div id="terminal"><div id="t-log"></div></div>

    <div class="input-line">
        <span id="pfx">></span>
        <input type="text" id="main-in" autocomplete="off" placeholder="Type 'help' for commands...">
    </div>

    <div class="m-grid" id="m-btns"></div>
</div>

<script>
    let u = {
        name: '', role: '', cash: 0, ip: '', lvl: 1, exp: 0,
        team: null, exploitRate: 10, virus: null, items: [], 
        isLogged: false, lastGlobalAttack: 0
    };

    const DARK_SHOP = [
        { id: 'v1', name: 'Virus Lv1', price: 3000, desc: 'ดักเงินอัตโนมัติทีละ $1' },
        { id: 'v2', name: 'Virus Lv2', price: 10000, desc: 'ดักเงินธนาคารโบนัส x100' },
        { id: 'v3', name: 'Virus Omega', price: 9000000000, desc: 'ดักเงินทุกคน 10% (คูลดาวน์ 2 เดือน)' },
        { id: 'change_ip', name: 'New Identity', price: 5000, desc: 'สุ่มเปลี่ยน IP ใหม่' },
        { id: 'hide_ip', name: 'Stealth Pack', price: 15000, desc: 'ซ่อน IP จากการ Trace 100%' },
        { id: 'bribe', name: 'Police Bribe', price: 20000, desc: 'บัตรปิดปากตำรวจ (กันโดนจับ 1 ครั้ง)' },
        { id: 'wipe', name: 'Data Wipe', price: 10000, desc: 'ล้างประวัติอาชญากรรมทั้งหมด' }
    ];

    function authAction(type) {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        if(!user || !pass) return alert("กรุณากรอกข้อมูลให้ครบ");
        
        if(type === 'reg') {
            localStorage.setItem(`user_${user}`, pass);
            document.getElementById('auth-msg').innerText = "ลงทะเบียนสำเร็จ! กรุณา Login";
        } else {
            if(localStorage.getItem(`user_${user}`) === pass) {
                u.name = user;
                document.getElementById('scr-auth').classList.add('hidden');
                document.getElementById('scr-role').classList.remove('hidden');
            } else {
                document.getElementById('auth-msg').innerText = "Username หรือ Password ผิด!";
            }
        }
    }

    function initRole(r) {
        u.role = r;
        u.ip = `${rand(255)}.${rand(255)}.${rand(255)}.${rand(255)}`;
        u.cash = (r === 'Hacker') ? 5000 : 10000;
        document.getElementById('scr-role').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        updateUI(); renderBtns();
        log(`[SYSTEM] ยินดีต้อนรับคุณ ${u.name}. เข้าสู่ระบบรักษาความปลอดภัย v12.0`, 'c-y');
    }

    function rand(n) { return Math.floor(Math.random() * n); }

    function updateUI() {
        document.getElementById('u-lvl').innerText = u.lvl;
        document.getElementById('u-cash').innerText = u.cash;
        document.getElementById('u-team').innerText = u.team || 'None';
        document.getElementById('u-ip').innerText = u.ip;
        document.getElementById('u-exp-rate').innerText = u.exploitRate;
        document.getElementById('pfx').innerText = `${u.name}@${u.role.toLowerCase()}:~$ `;
    }

    function log(m, c='') {
        const l = document.getElementById('t-log');
        const d = document.createElement('div');
        d.className = c;
        d.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}`;
        l.appendChild(d);
        document.getElementById('terminal').scrollTop = 99999;
    }

    function renderBtns() {
        const g = document.getElementById('m-btns');
        const b = ['help', 'missions', 'dark-shop', 'transfer', 'team-create', 'hack-central', 'upgrade-exploit', 'clear'];
        g.innerHTML = b.map(x => `<div class="m-btn" onclick="exec('${x}')">${x.toUpperCase()}</div>`).join('');
    }

    function exec(raw) {
        const a = raw.split(' ');
        const c = a[0].toLowerCase();
        if(c !== 'clear') log(`CMD: ${raw}`, 'c-sys');

        switch(c) {
            case 'help':
                log("--- COMMANDS ---");
                log("dark-shop / buy-dark [id] - ร้านค้ามืด");
                log("transfer [IP] [AMT] - โอนเงิน");
                log("team-create [name] / team-join [name] - ระบบทีม");
                log("hack-central - แฮกธนาคารใหญ่ (ต้องมีทีม)");
                log("upgrade-exploit - เพิ่มโอกาสแฮกสำเร็จ");
                break;

            case 'dark-shop':
                log("--- ILLEGAL MARKET ---");
                DARK_SHOP.forEach(i => log(`[${i.id}] ${i.name} - $${i.price} : ${i.desc}`, 'c-y'));
                break;

            case 'buy-dark':
                let item = DARK_SHOP.find(i => i.id === a[1]);
                if(item && u.cash >= item.price) {
                    u.cash -= item.price;
                    if(item.id === 'v1') u.virus = 'v1';
                    if(item.id === 'v2') u.virus = 'v2';
                    if(item.id === 'v3') {
                        let now = Date.now();
                        if(now - u.lastGlobalAttack < 5184000000) return log("ไวรัสโอเมก้ายังติดคูลดาวน์ 2 เดือน!", 'c-h');
                        u.lastGlobalAttack = now;
                        log("🔥 เปิดใช้งาน OMEGA VIRUS: ดักเงินทุกคน 10% สำเร็จ!", 'c-h');
                        u.cash += 1000000; // สมมติว่าได้จากทุกคน
                    }
                    if(item.id === 'change_ip') u.ip = `${rand(255)}.${rand(255)}.${rand(255)}.${rand(255)}`;
                    u.items.push(item.id);
                    log(`ซื้อ ${item.name} สำเร็จ!`, 'c-g');
                } else { log("เงินไม่พอหรือรหัสสินค้าผิด!", 'c-h'); }
                updateUI(); break;

            case 'transfer':
                let targetIp = a[1];
                let amt = parseInt(a[2]);
                if(targetIp && amt > 0 && u.cash >= amt) {
                    u.cash -= amt;
                    log(`โอนเงิน $${amt} ไปยัง IP ${targetIp} สำเร็จ (ระบบกันโกง: บันทึก Log แล้ว)`, 'c-p');
                } else { log("ข้อมูลการโอนไม่ถูกต้อง!"); }
                updateUI(); break;

            case 'team-create':
                if(!a[1]) return log("กรุณาใส่ชื่อทีม");
                u.team = a[1];
                log(`สร้างทีม [${u.team}] สำเร็จ!`, 'c-g');
                updateUI(); break;

            case 'upgrade-exploit':
                if(u.cash >= 5000) {
                    u.cash -= 5000; u.exploitRate += 5;
                    log("อัปเกรด Exploit สำเร็จ! โอกาสแฮกเพิ่มขึ้น 5%", 'c-g');
                } else { log("เงินไม่พอ ($5000)"); }
                updateUI(); break;

            case 'hack-central':
                if(!u.team) return log("ต้องมีทีมก่อนถึงจะแฮกธนาคารกลางได้!", 'c-h');
                log("กำลังเจาะระบบธนาคารกลางกับทีม...");
                setTimeout(() => {
                    if(Math.random() * 100 < u.exploitRate) {
                        let win = 50000 * u.lvl; u.cash += win;
                        log(`💰 สำเร็จ! ทีมของคุณได้รับเงินรางวัล $${win}`, 'c-g');
                    } else {
                        log("การแฮกล้มเหลว! ระบบป้องกันตรวจพบทีมของคุณ", 'c-h');
                        u.cash = Math.max(0, u.cash - 2000);
                    }
                    updateUI();
                }, 3000);
                break;

            case 'clear': document.getElementById('t-log').innerHTML = ''; break;
            default: log("ไม่พบคำสั่งนี้ พิมพ์ 'help' เพื่อดูรายการคำสั่ง");
        }
    }

    // Passive Virus Earnings
    setInterval(() => {
        if(u.virus === 'v1') { u.cash += 1; updateUI(); }
        if(u.virus === 'v2') { u.cash += 100; log("Virus v2: ดักเงินธนาคาร +$100", 'c-sys'); updateUI(); }
    }, 5000);

    document.getElementById('main-in').addEventListener('keydown', e => {
        if(e.key === 'Enter') { exec(e.target.value); e.target.value = ''; }
    });
</script>
</body>
</html>
